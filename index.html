<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#070b18" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <title>ボクセル・マージ（3D演算パズル）</title>
  </head>
  <body>
    <div id="ui">
      <h1>ボクセル・マージ</h1>
      <details class="howto" id="howto">
        <summary>遊び方（タップで開閉）</summary>
        <p class="hint">
        5×5×5 の透明ケースに数字キューブがあります。<strong>重力は常に画面の下向き</strong>に最も近い「床の向き」4種のいずれかにスナップされます（カメラを回すと変わります）。<strong>素早くスワイプ</strong>するとケースが 90°
        傾き、落下・合体のあと<strong>2 が 1 つ</strong>追加されます。長押しドラッグは視点回転（PC）。ピンチでズーム。音はミュート解除で。
        </p>
      </details>
      <p class="grav-line">
        <span class="lbl">いまの床の向き</span>
        <strong id="gravLabel">—</strong>
      </p>
      <div class="stats">
        <span>スコア: <strong id="score">0</strong></span>
        <span>最大ブロック: <strong id="max">2</strong></span>
      </div>
      <p class="status" id="status"></p>
      <button type="button" id="reset">リセット</button>
    </div>
    <canvas id="c"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
